name: 部署到 EdgeOne Makers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建
        run: pnpm build

      - name: 部署到 EdgeOne Makers
        run: pnpx edgeone pages deploy ./dist -n fc-space -t ${{ secrets.EDGEONE_API_TOKEN }}
